<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sample Locked Carousel Slide</title>
  </head>
  <body>
    <article class="slide">
      <div class="brand-row">
        <span class="brand-mark">LDB</span>
        <span>LinkedIn Design Builder</span>
      </div>

      <main class="content">
        <p class="kicker">Carousel system</p>
        <h1 data-lidb-copy>{{SLIDE_COPY}}</h1>
      </main>

      <img class="feature-image" data-lidb-image src="{{IMAGE_SRC}}" alt="" />

      <footer>
        <span>Slide <strong data-lidb-slide-number>{{SLIDE_NUMBER}}</strong>/<strong data-lidb-total-slides>{{TOTAL_SLIDES}}</strong></span>
        <span>Locked design</span>
      </footer>
    </article>
  </body>
</html>
